# Grafana dashboard provisioning — auto-loads dashboards from /var/lib/grafana/dashboards.

apiVersion: 1

providers:
  - name: helix-core
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
