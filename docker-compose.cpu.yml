# helix-core — CPU offload override
#
# Use with:
#   docker compose -f docker-compose.yml -f docker-compose.cpu.yml up -d
#
# Removes GPU reservation and forces all layers to CPU.
# Expects MODEL_KEY ending in -cpu (e.g. qwen2.5-coder-7b-cpu).

services:
  llama-server:
    command: >
      --model /models/model.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size ${CONTEXT_LENGTH}
      --n-gpu-layers 0
      --tool-call-parser ${TOOL_CALL_PARSER}
      --jinja
    deploy:
      resources: {}
