<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Glow effect behind title -->
  <ellipse cx="640" cy="200" rx="300" ry="120" fill="#6366f1" opacity="0.06"/>

  <!-- Title -->
  <text x="640" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">helix-core</text>

  <!-- Tagline -->
  <text x="640" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a1a1aa" font-weight="400">Run Claude Code with local models. Zero API costs. Fully private.</text>

  <!-- Terminal mockup -->
  <rect x="340" y="290" width="600" height="180" rx="12" fill="#1e1e2e" stroke="#333" stroke-width="1.5"/>

  <!-- Terminal dots -->
  <circle cx="365" cy="312" r="6" fill="#ff5f57"/>
  <circle cx="385" cy="312" r="6" fill="#febc2e"/>
  <circle cx="405" cy="312" r="6" fill="#28c840"/>

  <!-- Terminal text -->
  <text x="370" y="355" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="#6366f1">$</text>
  <text x="390" y="355" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="#e4e4e7">git clone https://github.com/mldeepsystems/helix-core.git</text>
  <text x="370" y="385" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="#6366f1">$</text>
  <text x="390" y="385" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="#e4e4e7">cd helix-core</text>
  <text x="370" y="415" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="#6366f1">$</text>
  <text x="390" y="415" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="#ffffff" font-weight="700">./scripts/helix</text>
  <text x="370" y="450" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="16" fill="#22c55e">&#x2713;  helix-core is ready. Launching Claude Code...</text>

  <!-- Bottom badges -->
  <text x="640" y="535" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#71717a">One command  &#xb7;  Any GPU  &#xb7;  Full observability  &#xb7;  366 tests</text>

  <!-- Bottom accent line -->
  <rect x="440" y="570" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
